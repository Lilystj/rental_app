{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card card-dark p-4">
            <h4 class="mb-3">User Login</h4>
            <form method="post">
                <div class="mb-2">
                    <label class="form-label small muted">Username</label>
                    <input name="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small muted">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <div class="d-grid">
                    <button class="btn btn-accent">Login</button>
                </div>
            </form>
            <div class="mt-3 small muted">Don't have an account? <a href="/register">Register</a></div>
        </div>
    </div>
</div>
{% endblock %}
