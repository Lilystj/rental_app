{% extends 'base.html' %}

{% block content %}
<style>
    .register-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, rgba(255, 152, 0, 0.1), rgba(33, 150, 243, 0.05));
        padding: 2rem 1rem;
    }

    .register-card {
        background: linear-gradient(135deg, #23272b 0%, #1a1d20 100%);
        border-radius: 20px;
        padding: 3rem 2rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 152, 0, 0.2);
        width: 100%;
        max-width: 500px;
    }

    .register-card h2 {
        color: #ff9800;
        font-weight: 800;
        margin-bottom: 0.5rem;
        font-size: 2rem;
    }

    .register-subtitle {
        color: #aaa;
        margin-bottom: 2rem;
        font-size: 0.95rem;
    }

    .form-group {
        margin-bottom: 1.2rem;
    }

    .form-group label {
        color: #fff;
        font-weight: 600;
        margin-bottom: 0.5rem;
        display: block;
        font-size: 0.9rem;
    }

    .form-group input {
        width: 100%;
        padding: 0.75rem 1rem;
        background: #1a1d20;
        border: 1px solid rgba(255, 152, 0, 0.2);
        border-radius: 10px;
        color: #fff;
        font-size: 0.95rem;
        transition: all 0.3s ease;
    }

    .form-group input:focus {
        outline: none;
        border-color: #ff9800;
        box-shadow: 0 0 12px rgba(255, 152, 0, 0.3);
        background: #20242a;
    }

    .form-group input::placeholder {
        color: #666;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }

    .btn-register {
        width: 100%;
        padding: 0.85rem 1.5rem;
        background: linear-gradient(135deg, #ff9800, #ffb74d);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 8px 24px rgba(255, 152, 0, 0.3);
        margin-top: 1rem;
    }

    .btn-register:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 32px rgba(255, 152, 0, 0.5);
    }

    .btn-register:active {
        transform: translateY(-1px);
    }

    .login-link {
        text-align: center;
        margin-top: 1.5rem;
        color: #aaa;
        font-size: 0.9rem;
    }

    .login-link a {
        color: #ff9800;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s ease;
    }

    .login-link a:hover {
        color: #ffb74d;
        text-decoration: underline;
    }

    .required {
        color: #f44336;
    }

    @media (max-width: 500px) {
        .register-card {
            padding: 2rem 1.5rem;
        }

        .form-row {
            grid-template-columns: 1fr;
        }

        .register-card h2 {
            font-size: 1.5rem;
        }
    }
</style>

<div class="register-container">
    <div class="register-card">
        <h2>Create Account</h2>
        <p class="register-subtitle">Join WheelShare and start renting vehicles today!</p>

        <form method="POST" action="/register">
            <!-- Username and Email Row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="username">Username <span class="required">*</span></label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="Enter email" required>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password <span class="required">*</span></label>
                <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
            </div>

            <!-- Phone, Age and Address Row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="10-digit mobile">
                </div>
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" min="1" id="age" name="age" placeholder="Your age">
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" placeholder="Your address">
                </div>
            </div>

            <button type="submit" class="btn-register">Register Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="/user/login">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
