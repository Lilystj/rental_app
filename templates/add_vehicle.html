{% extends 'base.html' %}

{% block content %}
<style>
    .add-vehicle-container {
        max-width: 900px;
        margin: 3rem auto;
        padding: 2rem;
    }
    .form-card {
        background: #23272b;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 0 12px #ff980040;
    }
    .form-card h2 {
        color: #ff9800;
        margin-bottom: 1.5rem;
        font-weight: 700;
    }
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        margin-bottom: 1.5rem;
    }
    .form-row.full {
        grid-template-columns: 1fr;
    }
    .form-group {
        display: flex;
        flex-direction: column;
    }
    .form-label {
        color: #ff9800;
        font-weight: 600;
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
    }
    .form-input, .form-select, .form-textarea {
        background: #20242a;
        border: 1px solid #ff9800;
        color: #fff;
        padding: 0.8rem;
        border-radius: 6px;
        font-size: 0.95rem;
        font-family: inherit;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
        outline: none;
        box-shadow: 0 0 8px #ff9800;
        border-color: #ffa726;
    }
    .form-textarea {
        resize: vertical;
        min-height: 120px;
    }
    .file-input-wrapper {
        position: relative;
        overflow: hidden;
    }
    .file-input-wrapper input[type="file"] {
        position: absolute;
        left: -9999px;
    }
    .file-input-label {
        background: #20242a;
        border: 2px dashed #ff9800;
        color: #aaa;
        padding: 1rem;
        border-radius: 6px;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
    }
    .file-input-label:hover {
        border-color: #ffa726;
        color: #ffa726;
    }
    .button-group {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
    }
    .btn-submit {
        background: #ff9800;
        color: #181c20;
        padding: 0.9rem 2rem;
        border: none;
        border-radius: 6px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s;
        font-size: 1rem;
    }
    .btn-submit:hover {
        background: #ffa726;
    }
    .btn-cancel {
        background: transparent;
        color: #ff9800;
        padding: 0.9rem 2rem;
        border: 2px solid #ff9800;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
    }
    .btn-cancel:hover {
        background: #ff9800;
        color: #181c20;
    }
    @media (max-width: 768px) {
        .form-row {
            grid-template-columns: 1fr;
        }
        .button-group {
            flex-direction: column;
        }
    }
</style>

<div class="add-vehicle-container">
    <div class="form-card">
        <h2>🚗 Add New Vehicle</h2>

        <form method="post" enctype="multipart/form-data">
            <!-- Basic Information -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Vehicle Name/Model *</label>
                    <input type="text" name="name" class="form-input" placeholder="e.g., Honda Civic 2023" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Brand *</label>
                    <input type="text" name="brand" class="form-input" placeholder="e.g., Honda" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group full">
                    <label class="form-label">Location *</label>
                    <input type="text" name="location" class="form-input" placeholder="City or area" required>
                </div>
            </div>

            <!-- Category and Type -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Category *</label>
                    <select name="category" class="form-select" required>
                        <option value="">Select Category</option>
                        <option value="Car">Car</option>
                        <option value="Bike">Bike</option>
                        <option value="SUV">SUV</option>
                        <option value="Truck">Truck</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group full">
                    <label class="form-label">
                        <input type="checkbox" name="subscription_only" value="1">
                        Premium subscription required for booking
                    </label>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Fuel Type *</label>
                    <select name="fuel_type" class="form-select" required>
                        <option value="">Select Fuel Type</option>
                        <option value="Petrol">Petrol</option>
                        <option value="Diesel">Diesel</option>
                        <option value="Electric">Electric</option>
                        <option value="Hybrid">Hybrid</option>
                    </select>
                </div>
            </div>

            <!-- Vehicle Details -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Vehicle Number/License Plate *</label>
                    <input type="text" name="vehicle_number" class="form-input" placeholder="e.g., DL-01-AB-1234" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Transmission *</label>
                    <select name="transmission" class="form-select" required>
                        <option value="">Select Transmission</option>
                        <option value="Manual">Manual</option>
                        <option value="Automatic">Automatic</option>
                    </select>
                </div>
            </div>

            <!-- Seating -->
            <div class="form-row">
                <div class="form-group full">
                    <label class="form-label">Seating Capacity *</label>
                    <input type="number" name="seating_capacity" class="form-input" placeholder="e.g., 5" min="1" max="50" required>
                </div>
            </div>

            <!-- Pricing -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Price Per Day (₹) *</label>
                    <input type="number" name="price_per_day" class="form-input" placeholder="e.g., 50.00" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Price Per Hour (₹)</label>
                    <input type="number" name="price_per_hour" class="form-input" placeholder="e.g., 5.00" step="0.01" min="0">
                </div>
            </div>

            <!-- Image Upload -->
            <div class="form-row full">
                <div class="form-group">
                    <label class="form-label">Vehicle Image</label>
                    <div class="file-input-wrapper">
                        <input type="file" name="image" id="imageInput" accept="image/*">
                        <label for="imageInput" class="file-input-label">
                            📸 Click to upload vehicle image or drag and drop
                        </label>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button type="submit" class="btn-submit">Add Vehicle</button>
                <a href="/admin" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
